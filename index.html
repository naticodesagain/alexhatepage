<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Stick Figure Snack Dash 🏃</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">

    <!-- ── Header ── -->
    <header class="game-header">
      <h1>🏃 Stick Figure Snack Dash</h1>
      <p class="subtitle">starring <span>Alemayehu "Chair Force" Nigussie</span></p>
    </header>

    <!-- ── Canvas area ── -->
    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
      <!-- Pause button floats over the canvas; hidden until game starts -->
      <button id="pauseBtn" class="pause-btn" title="Pause">⏸</button>
    </div>

    <!-- ── Mobile touch controls ── -->
    <div class="mobile-controls">
      <button id="btnLeft"  class="ctrl-btn" aria-label="Move left">◀</button>
      <div class="ctrl-label">MOVE</div>
      <button id="btnRight" class="ctrl-btn" aria-label="Move right">▶</button>
    </div>

    <!-- ── Keyboard hint (hidden on small screens) ── -->
    <footer class="game-footer">
      <span>← → or A / D to move</span>
      <span class="sep">·</span>
      <span>Space to start / restart / pause</span>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
